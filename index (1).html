<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="theme-color" content="#0E143D">
<link rel="manifest" href="/manifest.json">
<title>Gedeon Richter — Démo Agents IA</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}@keyframes scan{0%{top:0}100%{top:calc(100% - 3px)}}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Rubik',sans-serif;-webkit-font-smoothing:antialiased}</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const NAVY = "#0E143D";
const BLUE = "#2B7DE9";
const CYAN = "#00BCD4";
const GREEN = "#10B981";
const AMBER = "#F59E0B";
const RED = "#EF4444";
const PURPLE = "#7C3AED";
const G100 = "#F8FAFC";
const G200 = "#E2E8F0";
const G300 = "#CBD5E1";
const G500 = "#64748B";
const G700 = "#334155";
const G900 = "#0F172A";

// ───── Tiny helpers ─────
const delay = (ms) => new Promise((r) => setTimeout(r, ms));
const Tag = ({ color, children }) => (
  <span style={{ display: "inline-block", padding: "2px 7px", borderRadius: 4, fontSize: ".68rem", fontWeight: 600, background: color + "18", color }}>{children}</span>
);
const Gauge = ({ label, pct, color, val, labelW = 100 }) => (
  <div style={{ display: "flex", alignItems: "center", gap: 8, margin: "5px 0", fontSize: ".78rem" }}>
    <span style={{ width: labelW, flexShrink: 0, color: G700 }}>{label}</span>
    <div style={{ flex: 1, height: 8, background: G200, borderRadius: 4, overflow: "hidden" }}>
      <div style={{ width: `${pct}%`, height: "100%", borderRadius: 4, background: color, transition: "width 1s ease" }} />
    </div>
    <span style={{ width: 36, textAlign: "right", fontWeight: 600, color }}>{val}</span>
  </div>
);
const CardGrid = ({ items }) => (
  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, margin: "12px 0" }}>
    {items.map((it, i) => (
      <div key={i} style={{ background: G100, borderRadius: 8, padding: 10, textAlign: "center" }}>
        <div style={{ fontSize: "1.4rem", fontWeight: 800, color: it.color || NAVY }}>{it.num}</div>
        <div style={{ fontSize: ".65rem", color: G500, marginTop: 2 }}>{it.lbl}</div>
      </div>
    ))}
  </div>
);
const MiniTable = ({ headers, rows }) => (
  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: ".76rem", margin: "10px 0" }}>
    <thead><tr>{headers.map((h, i) => <th key={i} style={{ background: NAVY, color: "#fff", padding: "6px 8px", textAlign: "left", fontWeight: 600, fontSize: ".68rem", textTransform: "uppercase", letterSpacing: ".5px", borderRadius: i === 0 ? "6px 0 0 0" : i === headers.length - 1 ? "0 6px 0 0" : 0 }}>{h}</th>)}</tr></thead>
    <tbody>{rows.map((row, ri) => <tr key={ri} style={row.highlight ? { background: "rgba(239,68,68,.06)" } : {}}>{row.cells.map((c, ci) => <td key={ci} style={{ padding: "6px 8px", borderBottom: `1px solid ${G200}`, color: row.highlight ? RED : G700, fontWeight: row.highlight ? 600 : 400 }}>{c}</td>)}</tr>)}</tbody>
  </table>
);
const ChatMsg = ({ side, label, children }) => (
  <div style={{ maxWidth: "88%", padding: "10px 14px", borderRadius: 12, fontSize: ".82rem", lineHeight: 1.55, alignSelf: side === "user" ? "flex-end" : "flex-start", background: side === "user" ? BLUE : "#fff", color: side === "user" ? "#fff" : G700, border: side === "bot" ? `1px solid ${G200}` : "none", borderBottomRightRadius: side === "user" ? 4 : 12, borderBottomLeftRadius: side === "bot" ? 4 : 12 }}>
    {label && <div style={{ fontSize: ".65rem", fontWeight: 600, color: CYAN, textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 4 }}>{label}</div>}
    {children}
  </div>
);
const Diff = ({ children }) => (
  <div style={{ fontFamily: "'Courier New',monospace", fontSize: ".74rem", lineHeight: 1.7, padding: 12, background: G100, borderRadius: 8, margin: "8px 0", overflowX: "auto" }}>{children}</div>
);
const Del = ({ children }) => <span style={{ background: "rgba(239,68,68,.12)", color: RED, textDecoration: "line-through", padding: "1px 3px", borderRadius: 2 }}>{children}</span>;
const Add = ({ children }) => <span style={{ background: "rgba(16,185,129,.12)", color: GREEN, padding: "1px 3px", borderRadius: 2 }}>{children}</span>;
const Dots = () => <span style={{ display: "inline-flex", gap: 3 }}>{[0,1,2].map(i => <span key={i} style={{ width: 5, height: 5, borderRadius: "50%", background: G500, animation: `pulse 1s infinite ${i * .15}s` }} />)}</span>;

// ───── SECTION WRAPPER ─────
const Section = ({ children, style: s }) => (
  <div style={{ background: "#fff", borderRadius: 12, padding: "18px 16px", marginBottom: 12, boxShadow: "0 4px 24px rgba(14,20,61,.1)", ...s }}>{children}</div>
);
const SectionTitle = ({ dot, children }) => (
  <h4 style={{ fontSize: ".85rem", fontWeight: 700, color: NAVY, marginBottom: 10, display: "flex", alignItems: "center", gap: 8 }}>
    <span style={{ width: 8, height: 8, borderRadius: "50%", background: dot, flexShrink: 0 }} />{children}
  </h4>
);
const Btn = ({ onClick, children, outline, color = BLUE, small, disabled, style: s }) => (
  <button disabled={disabled} onClick={onClick} style={{ background: outline ? "transparent" : color, color: outline ? color : "#fff", border: outline ? `1.5px solid ${color}` : "none", borderRadius: 8, padding: small ? "6px 12px" : "10px 18px", fontFamily: "'Rubik',sans-serif", fontWeight: 600, fontSize: small ? ".76rem" : ".85rem", cursor: disabled ? "not-allowed" : "pointer", opacity: disabled ? .5 : 1, display: "inline-flex", alignItems: "center", gap: 6, transition: "all .2s", ...s }} >{children}</button>
);
const RoiBadges = ({ items }) => (
  <div style={{ display: "flex", gap: 10, marginTop: 10, flexWrap: "wrap" }}>
    {items.map((it, i) => <div key={i} style={{ background: G100, borderRadius: 8, padding: "7px 11px", fontSize: ".75rem", fontWeight: 600, color: NAVY }}>{it.val}<span style={{ display: "block", fontSize: ".63rem", fontWeight: 400, color: G500, marginTop: 2 }}>{it.lbl}</span></div>)}
  </div>
);

// ═══════════════════════════════════════════════════
// AGENT DEMOS
// ═══════════════════════════════════════════════════

// ── 1. AUDIT COÛTS ──
function DemoAudit() {
  const [step, setStep] = useState(0);
  const run = async () => { setStep(1); await delay(1500); setStep(2); await delay(2200); setStep(3); };
  return <>
    <Section><h3 style={{ fontSize: "1rem", fontWeight: 700, color: NAVY, marginBottom: 6 }}>📊 Simulation — Croisement factures × grilles tarifaires</h3><p style={{ fontSize: ".83rem", color: G500, lineHeight: 1.55 }}>L'agent ingère les factures entrepositaire et les compare ligne à ligne aux grilles contractuelles pour détecter écarts, anomalies et surfacturations.</p><RoiBadges items={[{val:"20-50K€/an",lbl:"Économie potentielle"},{val:"-90%",lbl:"Temps d'audit"}]} /></Section>
    <Section>
      <SectionTitle dot={BLUE}>Étape 1 — Chargement des factures</SectionTitle>
      <p style={{ fontSize: ".82rem", color: G500, marginBottom: 10 }}>L'agent reçoit la facture entrepositaire du mois et la grille tarifaire en vigueur.</p>
      {step === 0 && <Btn onClick={run}>▶ Lancer l'analyse</Btn>}
      {step === 1 && <div style={{ position: "relative", border: `2px solid ${BLUE}`, borderRadius: 8, padding: 16, minHeight: 80, overflow: "hidden" }}><div style={{ position: "absolute", left: 0, right: 0, height: 3, background: `linear-gradient(90deg,transparent,${CYAN},transparent)`, animation: "scan 2s ease-in-out infinite" }} /><p style={{ fontSize: ".78rem", color: G500, textAlign: "center", padding: "24px 0" }}>🔍 Croisement en cours — 347 lignes de facture × grille tarifaire...</p></div>}
      {step === 2 && <p style={{ fontSize: ".82rem", color: G500 }}><Dots /> Consolidation des résultats...</p>}
      {step === 3 && <>
        <CardGrid items={[{num:"347",lbl:"Lignes analysées"},{num:"12",lbl:"Anomalies détectées",color:RED},{num:"4 820€",lbl:"Écarts identifiés",color:AMBER},{num:"96.5%",lbl:"Lignes conformes",color:GREEN}]} />
        <h4 style={{ fontSize: ".82rem", fontWeight: 700, color: NAVY, margin: "12px 0 6px" }}>🚨 Anomalies prioritaires</h4>
        <MiniTable headers={["Type","Détail","Écart","Statut"]} rows={[
          {highlight:true,cells:["Transport froid","Tarif : 18,50€ vs contrat : 14,20€","+1 290€",<Tag color={RED}>Critique</Tag>]},
          {highlight:true,cells:["Picking","Double facturation lot #GR-2026-0847","+892€",<Tag color={RED}>Critique</Tag>]},
          {cells:["Stockage","Palettes frigo : 23 vs 19 déclarées","+640€",<Tag color={AMBER}>À vérifier</Tag>]},
          {cells:["Destruction","Imputation casse au lieu de péremption","+480€",<Tag color={AMBER}>Reclasser</Tag>]},
          {cells:["Réception","3 lignes sans réf. contractuelle","+318€",<Tag color={AMBER}>À vérifier</Tag>]},
        ]} />
        <p style={{ fontSize: ".78rem", color: G500, marginTop: 10 }}>💡 <strong>Recommandation :</strong> Les 2 premières anomalies représentent 2 182€. Base factuelle immédiate pour renégociation avec l'entrepositaire.</p>
      </>}
    </Section>
  </>;
}

// ── 2. REGATE ──
function DemoRegate() {
  const [step, setStep] = useState(-1);
  const stepsData = [
    { label: "Export Sage en cours...", pct: 20 },
    { label: "Extraction de 68 factures REGATE...", pct: 40 },
    { label: "Enrichissement IA — tags budget, région, événement...", pct: 65 },
    { label: "Injection dans le modèle Excel...", pct: 85 },
    { label: "Contrôles de cohérence & rapprochement forecast/réalisé...", pct: 100 },
  ];
  const run = async () => { for (let i = 0; i < stepsData.length; i++) { setStep(i); await delay(1100); } setStep(99); };
  return <>
    <Section><h3 style={{ fontSize: "1rem", fontWeight: 700, color: NAVY, marginBottom: 6 }}>💰 Simulation — Injection automatique des factures</h3><p style={{ fontSize: ".83rem", color: G500, lineHeight: 1.55 }}>L'agent extrait les données depuis Sage (provenant de REGATE), les enrichit avec des tags budget/région/événement, et les injecte dans le modèle Excel de budget.</p><RoiBadges items={[{val:"~5 j/mois",lbl:"Temps économisé"},{val:"-80%",lbl:"Erreurs de saisie"}]} /></Section>
    <Section>
      <SectionTitle dot={BLUE}>Pipeline — Export Sage → Budget Excel</SectionTitle>
      {step === -1 && <Btn onClick={run}>▶ Simuler le pipeline</Btn>}
      {step >= 0 && step < 99 && <>
        <div style={{ display: "flex", gap: 4, marginBottom: 10 }}>{stepsData.map((_, j) => <div key={j} style={{ width: j <= step ? 28 : 20, height: 4, borderRadius: 2, background: j < step ? GREEN : j === step ? BLUE : G200, transition: "all .3s" }} />)}</div>
        <p style={{ fontSize: ".82rem", color: G700, marginBottom: 6 }}>{stepsData[step].label}</p>
        <div style={{ height: 6, background: G200, borderRadius: 3, overflow: "hidden" }}><div style={{ height: "100%", borderRadius: 3, background: BLUE, transition: "width .8s ease", width: `${stepsData[step].pct}%` }} /></div>
      </>}
      {step === 99 && <>
        <CardGrid items={[{num:"68",lbl:"Factures traitées"},{num:"64",lbl:"Injectées OK",color:GREEN},{num:"3",lbl:"À valider",color:AMBER},{num:"1",lbl:"Rejetée",color:RED}]} />
        <MiniTable headers={["Facture","Fournisseur","Montant","Tags IA","Statut"]} rows={[
          {cells:["#R-2026-412","Hôtel Marriott Lyon","3 420€",<><Tag color={BLUE}>Événement</Tag>{" "}<Tag color={PURPLE}>Région 2</Tag></>,<Tag color={GREEN}>✓</Tag>]},
          {cells:["#R-2026-413","Agence MediaPharma","8 900€",<><Tag color={BLUE}>Congrès</Tag>{" "}<Tag color={PURPLE}>National</Tag></>,<Tag color={GREEN}>✓</Tag>]},
          {cells:["#R-2026-415","Traiteur DuParc","1 850€",<Tag color={AMBER}>?</Tag>,<Tag color={AMBER}>Aucun budget match</Tag>]},
        ]} />
        <p style={{ fontSize: ".78rem", color: G500, marginTop: 10 }}>⏱️ <strong>Temps total :</strong> 45 secondes vs. ~5 jours de saisie manuelle. Rapprochement forecast/réalisé : écart global de 2,3% — dans la tolérance.</p>
      </>}
    </Section>
  </>;
}

// ── 3. CONFORMITÉ LEM/HAS ──
function DemoConformite() {
  const [msgs, setMsgs] = useState([{ side: "bot", label: "Assistant LEM/HAS", text: "Bonjour ! Je suis connecté aux 1,18 TO de documents et aux référentiels LEM et HAS. Que souhaitez-vous vérifier ?" }]);
  const [loading, setLoading] = useState(false);
  const answers = {
    pharma: { q: "Quelles preuves pour la pharmacovigilance ?", a: <><strong>Pharmacovigilance — Preuves (LEM §4.2) :</strong><br /><br />✅ Procédure de déclaration des EI — <Tag color={GREEN}>Trouvé</Tag> <em>PV-PROC-2025-v3.pdf</em><br />✅ Registre des EI (12 mois) — <Tag color={GREEN}>Trouvé</Tag><br />⚠️ Formation VM pharmacovigilance — <Tag color={AMBER}>Expiré 15/09/2025</Tag><br />❌ Convention CRPV — <Tag color={RED}>Non trouvé</Tag><br /><br /><strong>Action :</strong> Renouveler formation VM + localiser convention CRPV.</> },
    formation: { q: "Où en est le suivi des formations ?", a: <><strong>Suivi formations — HAS prérequis #12-17 :</strong><br /><br /><Gauge label="VM terrain" pct={85} color={GREEN} val="85%" /><Gauge label="MSL" pct={100} color={GREEN} val="100%" /><Gauge label="Marketing" pct={60} color={AMBER} val="60%" /><Gauge label="Managers" pct={33} color={RED} val="33%" /><br />⚠️ <strong>3 VM</strong> sans certification charte. <strong>2 managers</strong> en retard Europharma Q1.</> },
    checklist: { q: "Générer check-list audit HAS", a: <><strong>Check-list audit HAS — 43 prérequis</strong><br /><em>Générée le 30/03/2026</em><br /><br />✅ 1. Engagement direction <Tag color={GREEN}>OK</Tag><br />✅ 2. Pharmacien responsable <Tag color={GREEN}>OK</Tag><br />⚠️ 3. Plan formation <Tag color={AMBER}>3 attestations manquantes</Tag><br />✅ 4. Procédure info médicale <Tag color={GREEN}>OK</Tag><br />❌ 5. Suivi engagements post-visite <Tag color={RED}>Non trouvé</Tag><br />✅ 6-11. Qualification intervenants <Tag color={GREEN}>OK</Tag><br />⚠️ 12. Évaluation connaissances <Tag color={AMBER}>2 résultats manquants</Tag><br /><br />📊 <strong>Synthèse : 34/43 conformes, 6 à compléter, 3 non trouvés.</strong></> },
  };
  const ask = async (key) => {
    if (loading) return;
    const a = answers[key];
    setMsgs(m => [...m, { side: "user", text: a.q }]);
    setLoading(true);
    await delay(1600);
    setMsgs(m => [...m, { side: "bot", label: "Assistant LEM/HAS", jsx: a.a }]);
    setLoading(false);
  };
  return <>
    <Section><h3 style={{ fontSize: "1rem", fontWeight: 700, color: NAVY, marginBottom: 6 }}>✅ Simulation — Recherche documentaire intelligente</h3><p style={{ fontSize: ".83rem", color: G500, lineHeight: 1.55 }}>L'assistant est connecté aux textes du LEM et au référentiel HAS (43 prérequis). Posez une question, il pointe les preuves et génère une check-list.</p><RoiBadges items={[{val:"-60%",lbl:"Temps prépa audit"},{val:"~0",lbl:"Risque d'oubli"}]} /></Section>
    <Section>
      <SectionTitle dot={CYAN}>Interrogez l'assistant</SectionTitle>
      <div style={{ display: "flex", flexDirection: "column", gap: 8, margin: "10px 0" }}>
        {msgs.map((m, i) => <ChatMsg key={i} side={m.side} label={m.label}>{m.jsx || m.text}</ChatMsg>)}
        {loading && <ChatMsg side="bot" label="Assistant LEM/HAS"><Dots /></ChatMsg>}
      </div>
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
        <Btn small outline onClick={() => ask("pharma")}>Preuves pharmacovigilance</Btn>
        <Btn small outline onClick={() => ask("formation")}>Suivi formations</Btn>
        <Btn small outline onClick={() => ask("checklist")}>Check-list audit</Btn>
      </div>
    </Section>
  </>;
}

// ── 4. TRADUCTION AMM ──
function DemoAmm() {
  const [step, setStep] = useState(0);
  const run = async () => { setStep(1); await delay(1800); setStep(2); await delay(1200); setStep(3); };
  return <>
    <Section><h3 style={{ fontSize: "1rem", fontWeight: 700, color: NAVY, marginBottom: 6 }}>🔄 Simulation — Diff + traduction d'un RCP</h3><p style={{ fontSize: ".83rem", color: G500, lineHeight: 1.55 }}>L'agent compare deux versions du RCP anglais, isole les passages modifiés, traduit et identifie les documents marketing impactés.</p><RoiBadges items={[{val:"-70%",lbl:"Temps par AMM"},{val:"5-20 cas/an",lbl:"× 2-3 jours chacun"}]} /></Section>
    <Section>
      <SectionTitle dot={CYAN}>Analyse du RCP</SectionTitle>
      {step === 0 && <Btn onClick={run}>▶ Analyser le RCP</Btn>}
      {step >= 1 && <><p style={{ fontSize: ".78rem", color: G500, marginBottom: 6 }}><strong>RCP Slinda® — Diff v4.2 → v4.3 (anglais)</strong></p><Diff><strong>Section 4.4 — Special warnings :</strong><br />Patients with a history of <Del>thromboembolic events</Del> <Add>venous or arterial thromboembolic events, including deep vein thrombosis, pulmonary embolism, and cerebrovascular events</Add> should be carefully monitored.<br /><br /><strong>Section 4.8 — Undesirable effects :</strong><br />Common: headache, <Add>mood changes (including depressed mood),</Add> nausea, acne.<br /><Add>Frequency not known: hypersensitivity reactions including angioedema.</Add></Diff></>}
      {step >= 2 && <><h4 style={{ fontSize: ".82rem", fontWeight: 700, color: NAVY, margin: "14px 0 6px" }}>🔤 Traduction alignée</h4><Diff><strong>Section 4.4 :</strong><br />Les patientes avec antécédents <Del>d'événements thromboemboliques</Del> <Add>d'événements thromboemboliques veineux ou artériels, incluant thrombose veineuse profonde, embolie pulmonaire et événements cérébrovasculaires</Add> doivent être surveillées.<br /><br /><strong>Section 4.8 :</strong><br />Fréquents : céphalées, <Add>troubles de l'humeur (y compris humeur dépressive),</Add> nausées, acné.<br /><Add>Fréquence indéterminée : réactions d'hypersensibilité incluant angioedème.</Add></Diff></>}
      {step >= 3 && <><h4 style={{ fontSize: ".82rem", fontWeight: 700, color: NAVY, margin: "14px 0 6px" }}>📋 Documents marketing impactés</h4><MiniTable headers={["Document","Section impactée","Priorité"]} rows={[
        {cells:["Brochure Slinda® pharmacien","Mises en garde",<Tag color={RED}>Haute</Tag>]},
        {cells:["Aide de visite VM — Tolérance","Effets indésirables",<Tag color={RED}>Haute</Tag>]},
        {cells:["FAQ HCP — Effets secondaires","Réponses #7 et #12",<Tag color={AMBER}>Moyenne</Tag>]},
        {cells:["Site web — Page Slinda®","Section sécurité",<Tag color={AMBER}>Moyenne</Tag>]},
      ]} /><p style={{ fontSize: ".78rem", color: G500, marginTop: 8 }}>⏱️ Temps estimé : <strong>35 minutes</strong> vs. 2-3 jours en traitement manuel</p></>}
    </Section>
  </>;
}

// ── 5. MARKETING AI FACTORY ──
function DemoMarketing() {
  const [tab, setTab] = useState("veille");
  const [veilleRun, setVeilleRun] = useState(false);
  const [contentRun, setContentRun] = useState(false);
  const [socialRun, setSocialRun] = useState(false);
  const [seoRun, setSeoRun] = useState(false);
  const [loading, setLoading] = useState(null);

  const doRun = async (which, setter) => { setLoading(which); await delay(1800); setter(true); setLoading(null); };

        {cells:["Theramex","Générique DIU hormonal — prix -25%",<Tag color={RED}>Élevé</Tag>]},
        {cells:["Organon","Étude Phase 4 Nexplanon®",<Tag color={AMBER}>Moyen</Tag>]},
        {cells:["HRA Pharma","Partenariat influenceuse 450K abonnés",<Tag color={AMBER}>Moyen</Tag>]},
      ]} /><p style={{ fontSize: ".78rem", color: G500 }}>⚡ <strong>Alerte :</strong> Le générique Theramex menace le segment DIU. Recommandation : activer le messaging « innovation brevetée ».</p></>}
    </Section>}
